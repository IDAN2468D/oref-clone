name: AI-First QA & Deploy CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    qa-suite:
        name: Critical QA Verification
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Verify Code Quality (Lint)
              run: npm run lint

            - name: Execute Autonomous Tests (QA Agent)
              run: npm run test

            - name: Build Production Artifact
              run: npm run build
              env:
                  NEXT_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  NEXT_PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
